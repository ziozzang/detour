name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy (no diff)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race ./...

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build detourd
        run: go build -trimpath -ldflags "-s -w" -o detourd ./cmd/detourd
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"

      - name: build detour CLI
        run: go build -trimpath -ldflags "-s -w" -o detour ./cmd/detour
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"

      - name: smoke test CLI
        run: |
          ./detour version
          ./detourd --version
