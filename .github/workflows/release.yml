name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & attach binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build (linux/amd64 + linux/arm64)
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          for ARCH in amd64 arm64; do
            for BIN in detourd detour; do
              GOOS=linux GOARCH=${ARCH} go build \
                -trimpath \
                -ldflags "-s -w -X main.version=${{ steps.ver.outputs.tag }} -X main.commit=${{ steps.ver.outputs.commit }} -X main.date=${{ steps.ver.outputs.date }}" \
                -o dist/${BIN}-linux-${ARCH} ./cmd/${BIN}
            done
            tar -C dist -czf dist/detour_${{ steps.ver.outputs.tag }}_linux_${ARCH}.tar.gz \
              detourd-linux-${ARCH} detour-linux-${ARCH}
          done
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
